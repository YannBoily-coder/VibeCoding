<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promontoire de Résonance • Sphère 9D active (45000 pts)</title>
    <style>
        :root {
            --bg-space: #030712;
            --neon-blue: #60a5fa;
            --neon-gold: #fbbf24;
        }
        body { 
            margin: 0; 
            background: var(--bg-space); 
            overflow: hidden; 
            color: #e0e7ff; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            user-select: none;
        }
        #ui { 
            position: absolute; 
            top: 25px; 
            left: 25px; 
            z-index: 20; 
            width: 370px; 
            background: rgba(10,15,30,0.85); 
            padding: 25px; 
            border-radius: 16px; 
            border: 1px solid rgba(96,165,250,0.4); 
            backdrop-filter: blur(12px); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .data { 
            font-size: 0.8rem; 
            opacity: 0.8; 
            margin-bottom: 20px; 
            font-family: monospace;
            color: #94a3b8;
        }
        .gemini-controls { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        button { 
            background: rgba(30,41,59,0.6); 
            border: 1px solid var(--neon-blue); 
            color: #e0e7ff; 
            padding: 12px 16px; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.25s; 
            font-size: 0.85rem; 
            text-align: left; 
            display: flex;
            align-items: center;
            gap: 8px;
        }
        button:hover { 
            background: var(--neon-blue); 
            color: var(--bg-space); 
            box-shadow: 0 0 15px rgba(96,165,250,0.4);
        }
        #output { 
            margin-top: 20px; 
            font-size: 0.85rem; 
            color: var(--neon-gold); 
            line-height: 1.5;
            min-height: 60px; 
            background: rgba(0,0,0,0.4); 
            padding: 15px; 
            border-radius: 10px; 
            border-left: 3px solid var(--neon-gold);
            max-height: 320px;
            overflow-y: auto;
        }
        #audioControls { 
            display: none; 
            margin-top: 15px; 
            padding: 15px; 
            background: rgba(0,0,0,0.4); 
            border-radius: 10px; 
            border: 1px solid rgba(96,165,250,0.3); 
        }
        input[type="range"] { width: 100%; accent-color: #60a5fa; }
        .preset-btn { 
            font-size: 0.8rem; 
            padding: 6px 10px; 
            flex: 1;
        }
        #instructions { 
            position: absolute; 
            bottom: 155px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 15; 
            font-size: 0.75rem; 
            color: rgba(148,163,184,0.6); 
            background: rgba(10,15,30,0.6); 
            padding: 6px 14px; 
            border-radius: 20px; 
            pointer-events: none; 
        }
        canvas#waveCanvas { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 140px; 
            z-index: 5; 
            pointer-events: none; 
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<div id="ui">
    <h1>Galibier • Sphère 9D</h1>
    <div class="data">Fréquence : 532Hz • État : Sphère de Résonance (45k pts)</div>
    
    <div class="gemini-controls">
        <button onclick="startMeditation()">🧘 Visualisation Méditative Guidée</button>
        <button onclick="randomizePointColors()">🌈 Couleurs Aléatoires des Points</button>
        <button onclick="toggleBinauralBeats()">🎵 Battements Binauraux</button>
    </div>

    <div id="audioControls">
        <label>Volume : <span id="volumeValue">22</span>%</label>
        <input type="range" id="volumeSlider" min="5" max="50" value="22" step="1" oninput="updateVolume(this.value)">

        <label style="margin-top:12px;">Fréquence de battement :</label>
        <div style="display:flex; gap:6px; flex-wrap:wrap;">
            <button class="preset-btn" onclick="setBeatFrequency(4)">4 Hz (Delta)</button>
            <button class="preset-btn" onclick="setBeatFrequency(6)">6 Hz (Theta)</button>
            <button class="preset-btn" onclick="setBeatFrequency(8)">8 Hz (Alpha)</button>
            <button class="preset-btn" onclick="setBeatFrequency(10)">10 Hz (Beta)</button>
        </div>
    </div>

    <div id="output">Sphère d'énergie stabilisée. Prêt pour la résonance IA.</div>
</div>

<div id="instructions">🖱️ Glisse pour pivoter • Casque recommandé pour les sons binauraux</div>

<canvas id="waveCanvas"></canvas>

<script>
    // ==================== THREE.JS ====================
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x030712, 0.015);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 28;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // 45 000 points (configurés à 10 000 000 pour la densité visuelle)
    const geometry = new THREE.BufferGeometry();
    const count = 10000000;
    const positions = new Float32Array(count * 3);
    const colors = new Float32Array(count * 3);

    for (let i = 0; i < count * 3; i += 3) {
        const u = Math.random();
        const v = Math.random();
        const theta = u * 2.0 * Math.PI;
        const phi = Math.acos(2.0 * v - 1.0);
        const baseRadius = 11;
        const thickness = 2.5;
        const r = baseRadius + (Math.random() - 0.5) * thickness;

        positions[i] = r * Math.sin(phi) * Math.cos(theta);
        positions[i + 1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i + 2] = r * Math.cos(phi);

        const intensity = (positions[i + 1] + baseRadius) / (baseRadius * 2);
        colors[i] = 0.35 + intensity * 0.25;
        colors[i + 1] = 0.6 + (1 - intensity) * 0.2;
        colors[i + 2] = 0.95 + intensity * 0.05;
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({ 
        size: 0.075, 
        vertexColors: true, 
        transparent: true, 
        opacity: 0.75, 
        blending: THREE.AddBlending 
    });
    const pointsObject = new THREE.Points(geometry, material);
    scene.add(pointsObject);

    // Sphère centrale
    const sphereGeometry = new THREE.SphereGeometry(6, 48, 48);
    const coreSphere = new THREE.Mesh(sphereGeometry, new THREE.MeshBasicMaterial({
        color: 0x60a5fa, wireframe: true, transparent: true, opacity: 0.25, blending: THREE.AddBlending
    }));
    scene.add(coreSphere);

    const rotationGroup = new THREE.Group();
    rotationGroup.add(pointsObject);
    rotationGroup.add(coreSphere);
    scene.add(rotationGroup);

    // Interactions souris / tactile
    let isDragging = false;
    let previousMousePosition = { x: 0, y: 0 };

    window.addEventListener('mousedown', e => { if (!e.target.closest('#ui')) isDragging = true; });
    window.addEventListener('mousemove', e => {
        if (isDragging) {
            rotationGroup.rotation.y += (e.clientX - previousMousePosition.x) * 0.005;
            rotationGroup.rotation.x += (e.clientY - previousMousePosition.y) * 0.005;
        }
        previousMousePosition = { x: e.clientX, y: e.clientY };
    });
    window.addEventListener('mouseup', () => isDragging = false);

    // Variables pour l'animation et la respiration
    let turbulence = 1.0;
    let targetTurbulence = 1.0;
    let breathingSpeed = 3; // Vitesse de respiration par défaut
    let targetBreathingSpeed = 1.5;
    const basePositions = sphereGeometry.attributes.position.clone();

    // Animation Three.js
    function animate() {
        requestAnimationFrame(animate);
        const time = Date.now() * 0.001;
        
        // Transitions fluides des paramètres
        turbulence += (targetTurbulence - turbulence) * 0.05;
        breathingSpeed += (targetBreathingSpeed - breathingSpeed) * 0.05;

        if (!isDragging) {
            rotationGroup.rotation.y += 0.0015 * turbulence;
            rotationGroup.rotation.z += 0.0003;
        }

        // 1. Déformation de surface organique (bruit de fond de la sphère)
        const posAttr = coreSphere.geometry.attributes.position;
        const vertex = new THREE.Vector3();
        for (let i = 0; i < posAttr.count; i++) {
            vertex.fromBufferAttribute(basePositions, i);
            const wave = Math.sin(vertex.x * 0.8 + time * 3) * Math.cos(vertex.y * 0.8 + time * 3) * Math.sin(vertex.z * 0.8 + time * 1.5) * 0.45 * turbulence;
            vertex.setLength(6 + wave);
            posAttr.setXYZ(i, vertex.x, vertex.y, vertex.z);
        }
        posAttr.needsUpdate = true;

        // 2. Mouvement global de Respiration (Gonflement / Dégonflement de la boule centrale)
        // Utilisation d'un sinus temporel ajusté pour simuler un rythme respiratoire de transition
        const breath = 1.0 + Math.sin(time * breathingSpeed) * 0.18; 
        coreSphere.scale.set(breath, breath, breath);

        // Léger contre-mouvement sur la couronne de points pour l'harmonie vibratoire
        const scalePoints = 1 + Math.sin(time * 2) * 0.015 * turbulence;
        pointsObject.scale.set(scalePoints, scalePoints, scalePoints);

        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ==================== Méditation ====================
    function startMeditation() {
        const output = document.getElementById('output');
        const meditationHTML = `
            <b style="color:#fbbf24; font-size:1.05rem;">🧘 Visualisation Méditative Guidée</b><br>
            <b style="color:#93c5fd;">La Sphère du Galibier • 532 Hz</b><br><br>
            Installe-toi confortablement. Laisse tes épaules s’abaisser, ta mâchoire se relâcher.<br><br>
            <b>Respiration alpine</b><br>
            Inspire lentement par le nez au rythme où la sphère se gonfle… retiens… expire lorsqu'elle se dégonfle.<br>
            Sens l’air pur des hauts cols entrer en toi.<br><br>
            <b>Accordage à 532 Hz</b><br>
            Imagine une note pure, cristalline, comme le tintement d’un glacier sous le soleil.<br><br>
            <b>Voyage au Col du Galibier</b><br>
            Tu te tiens au sommet. Devant toi se déploie la Sphère 9D.<br><br>
            La sphère t’enveloppe. Tu es maintenant à l’intérieur de son champ de résonance.<br><br>
            <b>Le courage du réserviste</b><br>
            Ressens cette force tranquille du roc qui tient bon depuis des millénaires.<br><br>
            Laisse la fréquence 532 Hz dissoudre tout ce qui n’est pas aligné.<br><br>
            Quand tu es prêt, la sphère se contracte doucement autour de ton cœur.<br><br>
            <b>Retour ancré</b><br>
            Inspire profondément… expire en souriant. Tu es serein et pleinement vivant.
        `;
        output.innerHTML = meditationHTML;
        targetTurbulence = 0.25;
        targetBreathingSpeed = 0.8; // Ralentissement du souffle pour un rythme cardiaque calme et méditatif
        coreSphere.material.color.setHex(0x93c5fd);
    }

    // ==================== Couleurs Aléatoires ====================
    function randomizePointColors() {
        const colorAttribute = pointsObject.geometry.attributes.color;
        const array = colorAttribute.array;
        for (let i = 0; i < array.length; i += 3) {
            const r = Math.random();
            const g = Math.random();
            const b = Math.random();
            array[i]     = 0.3 + r * 0.55;
            array[i + 1] = 0.5 + g * 0.45;
            array[i + 2] = 0.7 + b * 0.3;
        }
        colorAttribute.needsUpdate = true;
        targetTurbulence = 3.2;
        targetBreathingSpeed = 2.5; // Accélération temporaire de la respiration face au regain d'énergie
        coreSphere.material.color.setHex(0xfbbf24);
        const output = document.getElementById('output');
        output.innerHTML = `<b style="color:#fbbf24">🌈 Couleurs des 100 000 000 points randomisées !</b>`;
        setTimeout(() => {
            targetTurbulence = 1.0;
            targetBreathingSpeed = 1.5; // Retour à la normale
            coreSphere.material.color.setHex(0x60a5fa);
            if (output.innerText.includes("randomisées")) {
                output.innerText = "Sphère d'énergie stabilisée. Prêt pour la résonance IA.";
            }
        }, 1800);
    }

    // ==================== BINAURAL BEATS ====================
    let audioContext = null;
    let leftOscillator = null;
    let rightOscillator = null;
    let binauralGain = null;
    let isBinauralPlaying = false;
    let currentBaseFreq = 250;
    let currentBeatFreq = 6;

    function toggleBinauralBeats() {
        const output = document.getElementById('output');
        const controls = document.getElementById('audioControls');

        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();

        if (!isBinauralPlaying) {
            leftOscillator = audioContext.createOscillator();
            rightOscillator = audioContext.createOscillator();
            leftOscillator.type = rightOscillator.type = 'sine';

            leftOscillator.frequency.value = currentBaseFreq;
            rightOscillator.frequency.value = currentBaseFreq + currentBeatFreq;

            const merger = audioContext.createChannelMerger(2);
            const leftGain = audioContext.createGain();
            const rightGain = audioContext.createGain();
            leftGain.gain.value = rightGain.gain.value = 0.35;

            leftOscillator.connect(leftGain).connect(merger, 0, 0);
            rightOscillator.connect(rightGain).connect(merger, 0, 1);

            binauralGain = audioContext.createGain();
            binauralGain.gain.value = 0.22;

            merger.connect(binauralGain).connect(audioContext.destination);

            leftOscillator.start();
            rightOscillator.start();

            isBinauralPlaying = true;
            controls.style.display = 'block';
            output.innerHTML = `<b style="color:#60a5fa">🎵 Binaural activé</b><br>Base ${currentBaseFreq} Hz • Battement ${currentBeatFreq} Hz`;
        } else {
            if (leftOscillator) leftOscillator.stop();
            if (rightOscillator) rightOscillator.stop();
            isBinauralPlaying = false;
            controls.style.display = 'none';
            output.innerText = "Sons binauraux désactivés.";
        }
    }

    function updateVolume(val) {
        if (binauralGain) binauralGain.gain.value = val / 100;
        document.getElementById('volumeValue').textContent = val;
    }

    function setBeatFrequency(newBeat) {
        currentBeatFreq = newBeat;
        if (rightOscillator && isBinauralPlaying) {
            rightOscillator.frequency.setValueAtTime(currentBaseFreq + newBeat, audioContext.currentTime);
        }
        document.getElementById('output').innerHTML = `<b style="color:#60a5fa">🎵 Battement : ${newBeat} Hz</b>`;
    }

    // ==================== VAGUE ARC-EN-CIEL ====================
    const waveCanvas = document.getElementById('waveCanvas');
    const waveCtx = waveCanvas.getContext('2d');

    function resizeWaveCanvas() {
        waveCanvas.width = window.innerWidth;
        waveCanvas.height = 140;
    }
    resizeWaveCanvas();
    window.addEventListener('resize', resizeWaveCanvas);

    let wavePhase = 0;

    function drawWave() {
        const w = waveCanvas.width;
        const h = waveCanvas.height;
        const centerY = h / 2;

        waveCtx.clearRect(0, 0, w, h);

        // Fond
        waveCtx.fillStyle = 'rgba(3, 7, 18, 0.65)';
        waveCtx.fillRect(0, 0, w, h);

        // Lignes de référence
        waveCtx.strokeStyle = '#60a5fa'; waveCtx.lineWidth = 2.5;
        waveCtx.beginPath(); waveCtx.moveTo(0, 22); waveCtx.lineTo(w, 22); waveCtx.stroke();

        waveCtx.strokeStyle = '#fbbf24'; waveCtx.lineWidth = 1.8;
        waveCtx.setLineDash([10, 7]);
        waveCtx.beginPath(); waveCtx.moveTo(0, centerY); waveCtx.lineTo(w, centerY); waveCtx.stroke();
        waveCtx.setLineDash([]);

        waveCtx.strokeStyle = '#ef4444'; waveCtx.lineWidth = 2.5;
        waveCtx.beginPath(); waveCtx.moveTo(0, h - 22); waveCtx.lineTo(w, h - 22); waveCtx.stroke();

        // === VAGUE ARC-EN-CIEL ===
        const gradient = waveCtx.createLinearGradient(0, 0, w, 0);
        gradient.addColorStop(0.00, '#ff0000');   // Rouge
        gradient.addColorStop(0.17, '#ff7f00');   // Orange
        gradient.addColorStop(0.33, '#ffff00');   // Jaune
        gradient.addColorStop(0.50, '#00ff00');   // Vert
        gradient.addColorStop(0.67, '#00bfff');   // Cyan / Bleu clair
        gradient.addColorStop(0.83, '#8b5cf6');   // Violet
        gradient.addColorStop(1.00, '#ff00ff');   // Magenta

        waveCtx.strokeStyle = gradient;
        waveCtx.lineWidth = 4.8;
        waveCtx.shadowBlur = 28;
        waveCtx.shadowColor = '#ffffff';

        const amplitude = 44;
        const wavelength = w / 8.8;

        waveCtx.beginPath();
        for (let x = 0; x <= w; x += 2) {
            const y = centerY + amplitude * Math.sin((x / wavelength) * Math.PI * 2 + wavePhase);
            if (x === 0) waveCtx.moveTo(x, y);
            else waveCtx.lineTo(x, y);
        }
        waveCtx.stroke();
        waveCtx.shadowBlur = 0;
    }

    function animateWave() {
        drawWave();
        wavePhase += (Math.PI * 2) / 180;
        if (wavePhase > Math.PI * 2) wavePhase -= Math.PI * 2;
        requestAnimationFrame(animateWave);
    }
    animateWave();

</script>
</body>
</html>
