<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Visualiseur Moléculaire 3D - 4 Molécules Sync</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #030712;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    /* Disposition en Grille 2x2 */
    .grid-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      width: 100vw;
      height: 100vh;
    }

    .view {
      position: relative;
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Cards d'information */
    .info-card {
      position: absolute;
      top: 12px;
      left: 12px;
      color: #f3f4f6;
      background: rgba(15, 23, 42, 0.85);
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(8px);
      pointer-events: none;
      z-index: 10;
      max-width: 220px;
    }

    h2 { margin: 0 0 2px 0; font-size: 1rem; }
    .thc-title { color: #10b981; }
    .cbd-title { color: #06b6d4; }
    .lsd-title { color: #8b5cf6; }
    .psilo-title { color: #f59e0b; }

    .formula {
      font-family: monospace;
      color: #9ca3af;
      font-size: 0.8rem;
    }

    #global-help {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.9);
      color: #9ca3af;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      pointer-events: none;
      z-index: 100;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

  <div id="global-help">🔄 Quatuor 3D : THC | CBD | LSD | Psilocine (Rotation synchronisée)</div>

  <div class="grid-container">
    <!-- Haut Gauche : THC -->
    <div class="view" id="view-thc">
      <div class="info-card">
        <h2 class="thc-title">THC</h2>
        <div class="formula">C₂₁H₃₀O₂</div>
      </div>
    </div>

    <!-- Haut Droite : CBD -->
    <div class="view" id="view-cbd">
      <div class="info-card">
        <h2 class="cbd-title">CBD</h2>
        <div class="formula">C₂₁H₃₀O₂ (Isomère)</div>
      </div>
    </div>

    <!-- Bas Gauche : LSD -->
    <div class="view" id="view-lsd">
      <div class="info-card">
        <h2 class="lsd-title">LSD 🇫🇷</h2>
        <div class="formula">C₂₀H₂₅N₃O</div>
      </div>
    </div>

    <!-- Bas Droite : Psilocine -->
    <div class="view" id="view-psilo">
      <div class="info-card">
        <h2 class="psilo-title">Psilocine</h2>
        <div class="formula">C₁₂H₁₆N₂O</div>
      </div>
    </div>
  </div>

  <script>
    // Matériaux communs
    const matC = new THREE.MeshPhongMaterial({ color: 0x4b5563, shininess: 60 });
    const matH = new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 100 });
    const matO = new THREE.MeshPhongMaterial({ color: 0xef4444, shininess: 80 });
    const matN = new THREE.MeshPhongMaterial({ color: 0x3b82f6, shininess: 80 });
    const matBond = new THREE.MeshPhongMaterial({ color: 0x374151 });

    const geoC = new THREE.SphereGeometry(0.38, 20, 20);
    const geoH = new THREE.SphereGeometry(0.22, 16, 16);
    const geoO = new THREE.SphereGeometry(0.36, 20, 20);
    const geoN = new THREE.SphereGeometry(0.36, 20, 20);
    const geoBond = new THREE.CylinderGeometry(0.06, 0.06, 1, 10);

    function addBond(group, p1, p2) {
      const distance = p1.distanceTo(p2);
      const bond = new THREE.Mesh(geoBond, matBond);
      bond.scale.y = distance;
      bond.position.copy(p1).add(p2).multiplyScalar(0.5);
      bond.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), p2.clone().sub(p1).normalize());
      group.add(bond);
    }

    function setupMoleculeScene(containerId) {
      const container = document.getElementById(containerId);
      const scene = new THREE.Scene();
      
      const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
      camera.position.set(0, 3, 11);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(container.clientWidth, container.clientHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      container.appendChild(renderer.domElement);

      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;

      scene.add(new THREE.AmbientLight(0xffffff, 0.6));
      const light1 = new THREE.DirectionalLight(0xffffff, 0.8);
      light1.position.set(10, 20, 15);
      scene.add(light1);

      const group = new THREE.Group();
      scene.add(group);

      return { scene, camera, renderer, controls, group, container };
    }

    const views = [
      setupMoleculeScene('view-thc'),
      setupMoleculeScene('view-cbd'),
      setupMoleculeScene('view-lsd'),
      setupMoleculeScene('view-psilo')
    ];

    function renderMolecule(group, atoms, maxDist) {
      const meshList = atoms.map(a => {
        const mesh = new THREE.Mesh(a.geo, a.mat);
        mesh.position.copy(a.pos);
        group.add(mesh);
        return a.pos;
      });

      for(let i=0; i<meshList.length; i++) {
        for(let j=i+1; j<meshList.length; j++) {
          if(meshList[i].distanceTo(meshList[j]) < maxDist) {
            addBond(group, meshList[i], meshList[j]);
          }
        }
      }
    }

    // 1. THC
    (function(group) {
      const atoms = [], carbons = [];
      for(let i=0; i<6; i++) {
        const a = (i * Math.PI)/3;
        carbons.push(new THREE.Vector3(1.6*Math.cos(a) - 1.5, 1.6*Math.sin(a), 0));
      }
      carbons.push(new THREE.Vector3(-0.1, 0.8, 0.4), new THREE.Vector3(0.9, 0.1, 0.2), new THREE.Vector3(0.7, -1.1, 0.1));
      carbons.push(new THREE.Vector3(2.0, 0.7, -0.3), new THREE.Vector3(2.9, -0.2, 0.2), new THREE.Vector3(2.3, -1.4, -0.4));
      for(let i=1; i<=5; i++) carbons.push(new THREE.Vector3(-1.5 - (i*0.8), -1.5 - (i%2===0?0.2:-0.2), (i*0.15)));
      
      carbons.forEach(p => atoms.push({ pos: p, mat: matC, geo: geoC }));
      atoms.push({ pos: new THREE.Vector3(-0.1, 0.8, 0.4), mat: matO, geo: geoO }, { pos: new THREE.Vector3(-3.2, 1.0, -0.3), mat: matO, geo: geoO });
      carbons.forEach(c => {
        atoms.push({ pos: c.clone().add(new THREE.Vector3(0.5, 0.5, 0.5)), mat: matH, geo: geoH });
        atoms.push({ pos: c.clone().add(new THREE.Vector3(-0.5, -0.5, 0.5)), mat: matH, geo: geoH });
      });
      renderMolecule(group, atoms, 1.55);
    })(views[0].group);

    // 2. CBD (Cycle ouvert)
    (function(group) {
      const atoms = [], carbons = [];
      for(let i=0; i<6; i++) {
        const a = (i * Math.PI)/3;
        carbons.push(new THREE.Vector3(1.5*Math.cos(a) - 1.2, 1.5*Math.sin(a), 0));
      }
      // Deuxième anneau déconnecté (ouvert)
      for(let i=0; i<6; i++) {
        const a = (i * Math.PI)/3;
        carbons.push(new THREE.Vector3(1.5*Math.cos(a) + 1.2, 1.5*Math.sin(a) + 0.3, 0.6));
      }
      for(let i=1; i<=5; i++) carbons.push(new THREE.Vector3(-1.2 - (i*0.8), -1.4 - (i%2===0?0.2:-0.2), (i*0.15)));

      carbons.forEach(p => atoms.push({ pos: p, mat: matC, geo: geoC }));
      atoms.push({ pos: new THREE.Vector3(-0.2, 1.6, 0.2), mat: matO, geo: geoO }, { pos: new THREE.Vector3(0.3, -1.6, -0.2), mat: matO, geo: geoO });
      carbons.forEach(c => {
        atoms.push({ pos: c.clone().add(new THREE.Vector3(0.5, 0.5, 0.5)), mat: matH, geo: geoH });
        atoms.push({ pos: c.clone().add(new THREE.Vector3(-0.5, -0.5, 0.5)), mat: matH, geo: geoH });
      });
      renderMolecule(group, atoms, 1.55);
    })(views[1].group);

    // 3. LSD
    (function(group) {
      const atoms = [], carbons = [];
      for(let i=0; i<5; i++) {
        const a = (i * Math.PI)/3;
        carbons.push(new THREE.Vector3(1.5*Math.cos(a) - 2.0, 1.5*Math.sin(a), 0));
      }
      carbons.push(new THREE.Vector3(-0.3, 0.7, 0.3), new THREE.Vector3(0.7, 1.2, -0.2), new THREE.Vector3(1.0, -0.8, -0.3), new THREE.Vector3(-0.2, -0.7, 0.1));
      carbons.push(new THREE.Vector3(2.0, 1.0, -1.0), new THREE.Vector3(3.8, 1.4, -2.0), new THREE.Vector3(4.8, 0.9, -2.5), new THREE.Vector3(3.5, -0.4, -0.8), new THREE.Vector3(4.6, -0.7, -0.2));

      carbons.forEach(p => atoms.push({ pos: p, mat: matC, geo: geoC }));
      atoms.push({ pos: new THREE.Vector3(-2.0 + 1.5*Math.cos(5*Math.PI/3), 1.5*Math.sin(5*Math.PI/3), 0), mat: matN, geo: geoN });
      atoms.push({ pos: new THREE.Vector3(1.6, 0.3, 0.1), mat: matN, geo: geoN });
      atoms.push({ pos: new THREE.Vector3(3.0, 0.7, -1.3), mat: matN, geo: geoN });
      atoms.push({ pos: new THREE.Vector3(1.6, 1.9, -1.6), mat: matO, geo: geoO });

      carbons.forEach(c => {
        atoms.push({ pos: c.clone().add(new THREE.Vector3(0.5, 0.5, -0.5)), mat: matH, geo: geoH });
      });
      renderMolecule(group, atoms, 1.55);
    })(views[2].group);

    // 4. Psilocine
    (function(group) {
      const atoms = [], carbons = [];
      // Noyau Indole
      for(let i=0; i<5; i++) {
        const a = (i * Math.PI)/3;
        carbons.push(new THREE.Vector3(1.4*Math.cos(a) - 1.2, 1.4*Math.sin(a), 0));
      }
      carbons.push(new THREE.Vector3(0.3, 0.5, 0.2), new THREE.Vector3(1.3, -0.3, -0.1));
      // Chaîne éthylamine
      carbons.push(new THREE.Vector3(2.5, 0.2, 0.3), new THREE.Vector3(3.5, -0.6, -0.2));
      // Groupes Méthyles sur l'azote
      carbons.push(new THREE.Vector3(5.2, 0.3, 0.4), new THREE.Vector3(4.8, -1.5, -0.8));

      carbons.forEach(p => atoms.push({ pos: p, mat: matC, geo: geoC }));
      atoms.push({ pos: new THREE.Vector3(-1.2 + 1.4*Math.cos(5*Math.PI/3), 1.4*Math.sin(5*Math.PI/3), 0), mat: matN, geo: geoN }); // N Indole
      atoms.push({ pos: new THREE.Vector3(4.5, -0.3, 0.1), mat: matN, geo: geoN }); // N Amine
      atoms.push({ pos: new THREE.Vector3(-2.4, 1.2, 0.2), mat: matO, geo: geoO }); // OH Phénol

      carbons.forEach(c => {
        atoms.push({ pos: c.clone().add(new THREE.Vector3(0.45, 0.45, 0.45)), mat: matH, geo: geoH });
      });
      renderMolecule(group, atoms, 1.5);
    })(views[3].group);

    // --- ANIMATION ET SYNC ---
    let sharedAngle = 0;

    function animate() {
      requestAnimationFrame(animate);
      sharedAngle += 0.004;

      views.forEach(v => {
        v.group.rotation.y = sharedAngle;
        v.controls.update();
        v.renderer.render(v.scene, v.camera);
      });
    }

    window.addEventListener('resize', () => {
      views.forEach(v => {
        const w = v.container.clientWidth;
        const h = v.container.clientHeight;
        v.camera.aspect = w / h;
        v.camera.updateProjectionMatrix();
        v.renderer.setSize(w, h);
      });
    });

    animate();
  </script>
</body>
</html>
