<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Réseau Cristallin Émeraude - Aluminium & Béryllium Visibles</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #010309;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #info-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #e0e6ed;
      background: rgba(4, 8, 20, 0.95);
      padding: 18px 24px;
      border-radius: 12px;
      border: 1px solid rgba(76, 209, 149, 0.5);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(12px);
      max-width: 330px;
      pointer-events: none;
      z-index: 100;
    }
    h1 {
      font-size: 1.2rem;
      margin: 0 0 8px 0;
      color: #2ecc71;
      text-shadow: 0 0 15px rgba(46, 204, 113, 0.7);
    }
    h2 {
      font-size: 0.9rem;
      margin: 0 0 12px 0;
      color: #a8dadc;
      font-weight: normal;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 0 0 12px 0;
      font-size: 0.8rem;
    }
    li {
      margin-bottom: 6px;
      display: flex;
      align-items: center;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 10px;
    }
    p {
      margin: 0;
      font-size: 0.8rem;
      color: #94a3b8;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 8px;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

  <div id="info-panel">
    <h1>Réseau Émeraude Visuel</h1>
    <h2>Liaisons Covalentes & Atomes Mis en Valeur</h2>
    <ul>
      <li><span class="dot" style="background: #e74c3c;"></span> <strong>Si (Silicium)</strong></li>
      <li><span class="dot" style="background: #ffffff;"></span> <strong>O (Oxygène)</strong></li>
      <li><span class="dot" style="background: #3498db;"></span> <strong>Be (Béryllium)</strong></li>
      <li><span class="dot" style="background: #a855f7; box-shadow: 0 0 8px #a855f7;"></span> <strong>Al (Aluminium)</strong> - Bien visible</li>
      <li><span class="dot" style="background: #2ecc71; box-shadow: 0 0 8px #2ecc71;"></span> <strong>Inclusion Cr³⁺ (Chrome)</strong></li>
    </ul>
    <p>💡 <em>Clic gauche : Rotation | Clic droit : Pan | Molette : Zoom | clic droit : déplacement sur le plan</em></p>
  </div>

  <script>
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x010309, 0.01); 

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 22, 38);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.enablePan = true; 

    scene.add(new THREE.AmbientLight(0xffffff, 0.5)); 

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
    dirLight.position.set(20, 40, 20);
    scene.add(dirLight);

    // Matériaux : Aluminium rendu plus pétant et légèrement plus gros
    const matSi = new THREE.MeshPhongMaterial({ color: 0xe74c3c, shininess: 80 }); 
    const matO  = new THREE.MeshPhongMaterial({ color: 0xf1f2f6, opacity: 0.6, transparent: true });
    const matBe = new THREE.MeshPhongMaterial({ color: 0x3498db, shininess: 90 }); 
    
    // Violet plus vif & émissif pour que l'Aluminium ressorte tout de suite
    const matAl = new THREE.MeshStandardMaterial({ 
      color: 0xa855f7, 
      emissive: 0x5b21b6, 
      emissiveIntensity: 0.4, 
      roughness: 0.2 
    }); 
    
    const matBond = new THREE.MeshPhongMaterial({ color: 0x334155, opacity: 0.6, transparent: true });
    const matConnectionBond = new THREE.MeshPhongMaterial({ color: 0x22c55e }); // Vert fluo pour marquer la liaison inter-molécules
    
    const matCr = new THREE.MeshStandardMaterial({ 
      color: 0x2ecc71, emissive: 0x2ecc71, emissiveIntensity: 1.0, roughness: 0.1, metalness: 0.9
    });

    const R_HEX = 3.5; 
    const R_PERIPH_SCALE = 1.65; 
    const NUM_UNITS = 6;
    
    const SUPER_RADIUS = (R_HEX * R_PERIPH_SCALE) / Math.cos(Math.PI / NUM_UNITS);

    const geoAtom = new THREE.SphereGeometry(0.35, 24, 24);
    const geoAtomAl = new THREE.SphereGeometry(0.45, 24, 24); // Aluminium un poil plus grand pour la lisibilité
    const geoCenterAtom = new THREE.SphereGeometry(0.7, 32, 32);
    const geoCylinderBase = new THREE.CylinderGeometry(0.04, 0.04, 1, 12); // Liaisons plus fines pour ne pas cacher l'atome

    const superGroup = new THREE.Group();
    scene.add(superGroup);

    const allPeripheralAtoms = []; 
    const moleculeCenters = [];

    function createEmeraldMolecule(molIndex) {
      const group = new THREE.Group();
      const siPositions = [];

      const angleMol = (molIndex * Math.PI) / (NUM_UNITS / 2);
      const centerX = SUPER_RADIUS * Math.cos(angleMol);
      const centerZ = SUPER_RADIUS * Math.sin(angleMol);
      const centerPos = new THREE.Vector3(centerX, 0, centerZ);
      moleculeCenters.push(centerPos);
      
      group.position.copy(centerPos);
      group.rotateY(angleMol); 
      group.rotateY(Math.PI / NUM_UNITS); 

      function createBond(p1, p2, material = matBond) {
        const distance = p1.distanceTo(p2);
        const bond = new THREE.Mesh(geoCylinderBase, material);
        bond.scale.y = distance;
        bond.position.copy(p1).add(p2).multiplyScalar(0.5);
        bond.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), p2.clone().sub(p1).normalize());
        group.add(bond);
      }

      // 1. Silicium Internes
      for (let i = 0; i < 6; i++) {
        const angleSi = (i * Math.PI) / 3;
        const posSi = new THREE.Vector3(R_HEX * Math.cos(angleSi), 0, R_HEX * Math.sin(angleSi));
        siPositions.push(posSi);
        const atomSi = new THREE.Mesh(geoAtom, matSi);
        atomSi.position.copy(posSi);
        group.add(atomSi);
      }

      // 2. Oxygènes
      for (let i = 0; i < 6; i++) {
        const p1 = siPositions[i];
        const p2 = siPositions[(i + 1) % 6];
        const midPos = p1.clone().add(p2).multiplyScalar(0.5);
        midPos.y += (i % 2 === 0 ? 0.3 : -0.3);
        const atomO = new THREE.Mesh(geoAtom, matO);
        atomO.scale.set(0.65, 0.65, 0.65);
        atomO.position.copy(midPos);
        group.add(atomO);
        createBond(p1, midPos);
        createBond(midPos, p2);
      }

      // 3. Périphériques Al et Be (Décalage vertical alterné plus doux pour bien exposer l'Aluminium)
      const periphAtomsInfo = [];
      siPositions.forEach((siPos, idx) => {
        const localPeriphPos = siPos.clone().multiplyScalar(R_PERIPH_SCALE);
        
        // Alternance Béryllium / Aluminium
        const isAluminium = (idx % 2 !== 0); 
        localPeriphPos.y += (isAluminium ? 1.0 : -1.0); 
        
        const matPeripheral = isAluminium ? matAl : matBe;
        const geoMesh = isAluminium ? geoAtomAl : geoAtom;

        const atomPeripheral = new THREE.Mesh(geoMesh, matPeripheral);
        atomPeripheral.position.copy(localPeriphPos);
        group.add(atomPeripheral);

        createBond(siPos, localPeriphPos);

        group.updateMatrixWorld();
        const worldPeriphPos = localPeriphPos.clone().applyMatrix4(group.matrixWorld);

        periphAtomsInfo.push({ 
            localPos: localPeriphPos, 
            worldPos: worldPeriphPos, 
            type: isAluminium ? 'Al' : 'Be', 
            moleculeIndex: molIndex 
        });
      });
      allPeripheralAtoms.push(periphAtomsInfo);

      // 4. Chrome Central
      const centerChrome = new THREE.Mesh(geoCenterAtom, matCr);
      group.add(centerChrome);
      siPositions.forEach(pos => createBond(new THREE.Vector3(0, 0, 0), pos)); 

      const pointLight = new THREE.PointLight(0x2ecc71, 0.7, 20);
      pointLight.position.copy(centerPos);
      scene.add(pointLight);

      return group;
    }

    for (let i = 0; i < NUM_UNITS; i++) {
      const molecule = createEmeraldMolecule(i);
      superGroup.add(molecule);
    }

    // Liaisons entre molécules (en vert fluo pour bien les repérer)
    const processedContacts = [];
    for (let i = 0; i < NUM_UNITS; i++) {
        const nextMolIndex = (i + 1) % NUM_UNITS;
        const currentPeripherals = allPeripheralAtoms[i];
        const nextPeripherals = allPeripheralAtoms[nextMolIndex];

        currentPeripherals.forEach(periphA => {
            nextPeripherals.forEach(periphB => {
                const distanceWorld = periphA.worldPos.distanceTo(periphB.worldPos);
                if (distanceWorld < 1.8) { 
                    const contactId = `${i}-${periphA.type}_${nextMolIndex}-${periphB.type}`;
                    if(!processedContacts.includes(contactId)){
                        processedContacts.push(contactId);
                        const midWorldPos = periphA.worldPos.clone().add(periphB.worldPos).multiplyScalar(0.5);

                        const bond = new THREE.Mesh(
                          new THREE.CylinderGeometry(0.08, 0.08, 1, 12), 
                          matConnectionBond
                        );
                        bond.scale.y = distanceWorld;
                        bond.position.copy(midWorldPos);
                        bond.quaternion.setFromUnitVectors(
                          new THREE.Vector3(0, 1, 0), 
                          periphB.worldPos.clone().sub(periphA.worldPos).normalize()
                        );
                        
                        superGroup.add(bond);
                    }
                }
            });
        });
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const elapsedTime = clock.getElapsedTime();

      superGroup.rotation.y += 0.002;
      superGroup.rotation.x = Math.sin(elapsedTime * 0.1) * 0.08; 

      controls.update();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>
