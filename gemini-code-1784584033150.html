<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibrium Vbλ • Console Telemetry F12 • Via Google Gemini</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

        body {
            margin: 0;
            background: #0a001f;
            color: #fff;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 2.8rem;
            text-shadow: 0 0 30px #a020f0;
            margin: 0 0 8px 0;
            letter-spacing: 3px;
        }

        .subtitle {
            color: #a78bfa;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        canvas {
            border: 3px solid #4b0082;
            border-radius: 16px;
            box-shadow: 0 0 60px rgba(160, 32, 240, 0.6),
                        0 0 120px rgba(160, 32, 240, 0.3);
            background: #0a001f;
        }

        .controls {
            margin-top: 25px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        button {
            padding: 12px 28px;
            background: linear-gradient(145deg, #4b0082, #6a0dad);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(160, 32, 240, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(160, 32, 240, 0.6);
        }

        .info {
            margin-top: 15px;
            color: #a78bfa;
            font-size: 0.95rem;
            text-align: center;
            max-width: 520px;
        }
    </style>
</head>
<body>
    <h1>⚛️ VIBRIUM</h1>
    <div class="subtitle">Vibrium Vbλ • Console Telemetry F12 • Via Google Gemini</div>

    <canvas id="canvas" width="720" height="720"></canvas>

    <div class="controls">
        <button onclick="boostVibration()">🚀 BOOSTER LA VIBE</button>
        <button onclick="resetBoost()" style="background: #2a004d;">Reset</button>
    </div>

    <div class="info">
        Ouvre ta console F12 pour voir la télémétrie en live !<br>
        Clique sur le canvas ou appuie sur <strong>ESPACE</strong> pour changer les metrics.
    </div>

    <script>
        // --- Setup du canvas ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // --- Variables globales ---
        let particles = [];
        let boostLevel = 1;
        let frameCount = 0; // Compteur pour modérer les logs console

        // --- Classe Particle ---
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.angle = Math.random() * Math.PI * 2;
                this.baseRadius = 90 + Math.random() * 200;
                this.radius = this.baseRadius;
                this.speed = 0.004 + Math.random() * 0.018;
                this.size = 2.5 + Math.random() * 5.5;
                this.hue = 255 + Math.random() * 70;
                this.vibPhase = Math.random() * Math.PI * 2;
                this.direction = Math.random() > 0.5 ? 1 : -1;
            }

            update() {
                // L'accélération dépend du boostLevel global
                this.angle += this.speed * this.direction * boostLevel;

                // --- EFFET DE RETOUR PROGRESSIF & ADAPTATION DE LA VITESSE ---
                if (this.baseRadius < 90) {
                    this.baseRadius += 0.2 * (10 / boostLevel);

                    // On calme aussi leur vitesse intrinsèque au fur et à mesure qu'elles s'éloignent
                    if (this.speed > 0.022) {
                        this.speed *= 0.99; // Freinage progressif de la particule excitée
                    }

                    if (this.baseRadius > 90) {
                        this.baseRadius = 90 + Math.random() * 200; // Orbite externe définitive
                        this.speed = 0.004 + Math.random() * 0.018; // Retour à une vitesse de croisière normale
                    }
                }

                // Vibration classique du Vibrium
                const vib = Math.sin(Date.now() / 110 + this.vibPhase) * (9 * (boostLevel * 0.6 + 0.4));
                this.radius = this.baseRadius + vib;

                // Micro-wobble
                this.angle += Math.sin(Date.now() / 280 + this.vibPhase) * 0.0015 * boostLevel;
            }

            draw() {
                const x = canvas.width / 2 + Math.cos(this.angle) * this.radius;
                const y = canvas.height / 2 + Math.sin(this.angle) * this.radius;

                ctx.shadowBlur = 22 * boostLevel;
                ctx.shadowColor = `hsl(${this.hue}, 100%, 70%)`;

                ctx.beginPath();
                ctx.arc(x, y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${this.hue}, 100%, ${55 + Math.random() * 25}%)`;
                ctx.fill();

                ctx.shadowBlur = 6;
                ctx.beginPath();
                ctx.arc(x, y, this.size * 0.35, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();

                ctx.shadowBlur = 0;
            }
        }

        function createParticles(count = 110) {
            particles = [];
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        function drawCore() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const t = Date.now();

            // Sécurisation avec Math.max pour empêcher les valeurs négatives dues à un boost élevé
            const pulse = Math.max(0.1, 1 + Math.sin(t / 260) * 0.13 * boostLevel);
            const pulse2 = Math.max(0.1, 1 + Math.sin(t / 190) * 0.09 * boostLevel);

            // Aura externe violette (champ d'énergie)
            ctx.shadowBlur = 70 * boostLevel;
            ctx.shadowColor = '#c084fc';
            ctx.beginPath();
            ctx.arc(cx, cy, 95 * pulse2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(167, 139, 250, 0.12)';
            ctx.fill();
            ctx.shadowBlur = 0;

            // Couches du noyau
            ctx.shadowBlur = 45 * boostLevel;
            ctx.shadowColor = '#a020f0';
            ctx.beginPath();
            ctx.arc(cx, cy, 52 * pulse, 0, Math.PI * 2);
            ctx.fillStyle = '#4c1d95';
            ctx.fill();
            ctx.shadowBlur = 0;

            // Noyau métallique avec dégradé radial
            const grad = ctx.createRadialGradient(cx - 12, cy - 12, 8, cx, cy, 55);
            grad.addColorStop(0, '#e0b0ff');
            grad.addColorStop(0.4, '#7c3aed');
            grad.addColorStop(1, '#1e1135');

            ctx.beginPath();
            ctx.arc(cx, cy, 38 * pulse, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();

            // Centre ultra-bright
            ctx.beginPath();
            ctx.arc(cx, cy, 16 * pulse, 0, Math.PI * 2);
            ctx.fillStyle = '#f0abfc';
            ctx.fill();

            // Anneaux d'énergie
            ctx.strokeStyle = 'rgba(224, 176, 255, 0.55)';
            ctx.lineWidth = 2.5;
            for (let r = 62; r < 88; r += 13) {
                ctx.beginPath();
                ctx.arc(cx, cy, r * pulse2, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        // --- Boucle d'animation avec Log Télémétrie ---
        function animate() {
            ctx.fillStyle = 'rgba(10, 0, 31, 0.28)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawCore();

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            ctx.shadowBlur = 0;

            if (boostLevel > 1) {
                boostLevel *= 0.993;
                if (boostLevel < 1.02) boostLevel = 1;
            }

            // TÉLÉMÉTRIE LIVE : Log propre toutes les 30 frames (~2 fois par seconde)
            frameCount++;
            if (frameCount % 30 === 0) {
                console.clear(); // Optionnel : nettoie l'historique pour garder une seule ligne propre
                console.log(
                    `%c[Vbλ Telemetry] %cBoost: ${boostLevel.toFixed(3)} %c| Particules: ${particles.length}`,
                    'color: #a020f0; font-weight: bold;',
                    boostLevel > 1 ? 'color: #00ff00; font-weight: bold;' : 'color: #a78bfa;',
                    'color: #e0b0ff;'
                );
            }

            requestAnimationFrame(animate);
        }

        function boostVibration() {
            boostLevel = Math.min(boostLevel * 2.3, 9);

            for (let i = 0; i < 25; i++) {
                const p = new Particle();
                p.baseRadius = 35 + Math.random() * 55;
                p.radius = p.baseRadius;
                p.speed *= 2.8;
                particles.push(p);
            }

            if (particles.length > 200) {
                particles = particles.slice(-160);
            }

            // Log immédiat au moment du déclenchement du boost
            console.log('%c🚀 BURST APPLIQUÉ ! Énergie maximale atteinte.', 'color: #00ff00; font-weight: bold;');
        }

        function resetBoost() {
            boostLevel = 1;
            console.log('%c🔄 Réinitialisation de la vibration.', 'color: #ff3333;');
        }

        canvas.addEventListener('click', boostVibration);

        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                boostVibration();
            }
            if (e.key.toLowerCase() === 'r') {
                resetBoost();
            }
        });

        createParticles();
        animate();

        console.log('%c[Vibrium Vbλ Engine] Prêt et synchronisé. Ouvrez la console.', 'color:#c084fc; font-weight:bold;');
    </script>
</body>
</html>
