<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibrium Vbλ • Dynamic State Shift 277Hz ↔ 532Hz</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

        body {
            margin: 0;
            background: #0a001f;
            color: #fff;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 2.8rem;
            text-shadow: 0 0 30px #a020f0;
            margin: 0 0 8px 0;
            letter-spacing: 3px;
        }

        .subtitle {
            color: #a78bfa;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        canvas {
            border: 3px solid #4b0082;
            border-radius: 16px;
            box-shadow: 0 0 60px rgba(160, 32, 240, 0.6),
                        0 0 120px rgba(160, 32, 240, 0.3);
            background: #0a001f;
        }

        .controls {
            margin-top: 25px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        button {
            padding: 12px 28px;
            background: linear-gradient(145deg, #4b0082, #6a0dad);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(160, 32, 240, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(160, 32, 240, 0.6);
        }

        .info {
            margin-top: 15px;
            color: #a78bfa;
            font-size: 0.95rem;
            text-align: center;
            max-width: 520px;
        }
    </style>
</head>
<body>
    <h1>⚛️ VIBRIUM</h1>
    <div class="subtitle">Vibrium Vbλ • State Transition (277Hz ↔ 532Hz) • Console Telemetry F12</div>

    <canvas id="canvas" width="720" height="720"></canvas>

    <div class="controls">
        <button onclick="boostVibration()">🚀 SAUT D'ÉTAT (532Hz)</button>
        <button onclick="resetBoost()" style="background: #2a004d;">Reset (277Hz)</button>
    </div>

    <div class="info">
        Ouvre ta console F12 pour voir la transition d'état !<br>
        Clique sur le canvas ou appuie sur <strong>ESPACE</strong> pour changer d'état.
    </div>

    <script>
        // --- Setup du canvas ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // --- Variables globales & États ---
        let particles = [];
        let boostLevel = 1;
        let frameCount = 0;

        // Fréquence active calculée dynamiquement entre 277Hz et 532Hz
        let currentFreq = 277;

        // --- Classe Particle ---
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.angle = Math.random() * Math.PI * 2;
                this.baseRadius = 90 + Math.random() * 200;
                this.radius = this.baseRadius;
                this.speed = 0.004 + Math.random() * 0.018;
                this.size = 2.5 + Math.random() * 5.5;
                this.hue = 255 + Math.random() * 70;
                this.vibPhase = Math.random() * Math.PI * 2;
                this.direction = Math.random() > 0.5 ? 1 : -1;
            }

            update() {
                this.angle += this.speed * this.direction * boostLevel;

                if (this.baseRadius < 90) {
                    this.baseRadius += 0.2 * (10 / boostLevel);

                    if (this.speed > 0.022) {
                        this.speed *= 0.99;
                    }

                    if (this.baseRadius > 90) {
                        this.baseRadius = 90 + Math.random() * 200;
                        this.speed = 0.004 + Math.random() * 0.018;
                    }
                }

                // La fréquence d'oscillation radiale dépend de l'état fréquentiel courant (currentFreq)
                const vib = Math.sin(Date.now() / (1000 / currentFreq) + this.vibPhase) * (9 * (boostLevel * 0.6 + 0.4));
                this.radius = this.baseRadius + vib;

                this.angle += Math.sin(Date.now() / 280 + this.vibPhase) * 0.0015 * boostLevel;
            }

            draw() {
                const x = canvas.width / 2 + Math.cos(this.angle) * this.radius;
                const y = canvas.height / 2 + Math.sin(this.angle) * this.radius;

                ctx.shadowBlur = 22 * boostLevel;
                ctx.shadowColor = `hsl(${this.hue}, 100%, 70%)`;

                ctx.beginPath();
                ctx.arc(x, y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${this.hue}, 100%, ${55 + Math.random() * 25}%)`;
                ctx.fill();

                ctx.shadowBlur = 6;
                ctx.beginPath();
                ctx.arc(x, y, this.size * 0.35, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();

                ctx.shadowBlur = 0;
            }
        }

        function createParticles(count = 277) {
            particles = [];
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        function drawCore() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const t = Date.now();

            const pulse = Math.max(0.1, 1 + Math.sin(t / 260) * 0.13 * boostLevel);
            const pulse2 = Math.max(0.1, 1 + Math.sin(t / 190) * 0.09 * boostLevel);

            ctx.shadowBlur = 70 * boostLevel;
            ctx.shadowColor = '#c084fc';
            ctx.beginPath();
            ctx.arc(cx, cy, 95 * pulse2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(167, 139, 250, 0.12)';
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.shadowBlur = 45 * boostLevel;
            ctx.shadowColor = '#a020f0';
            ctx.beginPath();
            ctx.arc(cx, cy, 52 * pulse, 0, Math.PI * 2);
            ctx.fillStyle = '#4c1d95';
            ctx.fill();
            ctx.shadowBlur = 0;

            const grad = ctx.createRadialGradient(cx - 12, cy - 12, 8, cx, cy, 55);
            grad.addColorStop(0, '#e0b0ff');
            grad.addColorStop(0.4, '#7c3aed');
            grad.addColorStop(1, '#1e1135');

            ctx.beginPath();
            ctx.arc(cx, cy, 38 * pulse, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();

            ctx.beginPath();
            ctx.arc(cx, cy, 16 * pulse, 0, Math.PI * 2);
            ctx.fillStyle = '#f0abfc';
            ctx.fill();

            ctx.strokeStyle = 'rgba(224, 176, 255, 0.55)';
            ctx.lineWidth = 2.5;
            for (let r = 62; r < 88; r += 13) {
                ctx.beginPath();
                ctx.arc(cx, cy, r * pulse2, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        // --- Boucle d'animation avec Transition d'État ---
        function animate() {
            ctx.fillStyle = 'rgba(10, 0, 31, 0.28)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawCore();

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            ctx.shadowBlur = 0;

            // --- GESTION DE LA TRANSITION ET RETOUR À L'ÉQUILIBRE ---
            if (boostLevel > 1) {
                boostLevel *= 0.993;

                // Amortissement progressif du nombre de particules (532 -> 277)
                if (particles.length > 277) {
                    particles.pop();
                }

                // La fréquence redescend doucement vers 277 Hz en suivant le boost
                currentFreq = 277 + (532 - 277) * ((boostLevel - 1) / 8);

                if (boostLevel < 1.02) {
                    boostLevel = 1;
                    currentFreq = 277;
                }
            } else {
                currentFreq = 277;
                // Sécurité pour garder exactement 277 à l'état de repos
                if (particles.length > 277) {
                    particles.pop();
                }
            }

            // TÉLÉMÉTRIE LIVE
            frameCount++;
            if (frameCount % 30 === 0) {
                console.clear();
                console.log(
                    `%c[Vbλ Telemetry] %cÉtat: ${currentFreq > 300 ? 'EXCITÉ (532Hz)' : 'FONDAMENTAL (277Hz)'} %c| Freq: ${Math.round(currentFreq)} Hz %c| Particules: ${particles.length}`,
                    'color: #a020f0; font-weight: bold;',
                    currentFreq > 300 ? 'color: #00ff00; font-weight: bold;' : 'color: #a78bfa;',
                    'color: #00e5ff; font-weight: bold;',
                    'color: #e0b0ff;'
                );
            }

            requestAnimationFrame(animate);
        }

        function boostVibration() {
            boostLevel = 9; // Excitation maximale instantanée
            currentFreq = 532; // Saut d'état à 532 Hz

            // Ajustement instantané de la population jusqu'à 532 particules
            while (particles.length < 532) {
                const p = new Particle();
                p.baseRadius = 35 + Math.random() * 55;
                p.radius = p.baseRadius;
                p.speed *= 2.8;
                particles.push(p);
            }

            console.log('%c⚡ TRANSITION D\'ÉTAT EFFECTUÉE ! Passé à 532 particules @ 532Hz.', 'color: #00ff00; font-weight: bold;');
        }

        function resetBoost() {
            boostLevel = 1;
            currentFreq = 277;
            createParticles(277); // Retour à 277 particules à l'état fondamental
            console.log('%c🔄 Retour à l\'état fondamental (277 particules @ 277Hz).', 'color: #ff3333;');
        }

        canvas.addEventListener('click', boostVibration);

        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                boostVibration();
            }
            if (e.key.toLowerCase() === 'r') {
                resetBoost();
            }
        });

        // Initialisation à l'état fondamental (277 particules @ 277Hz)
        createParticles(277);
        animate();

        console.log('%c[Vibrium Engine] Prêt. État fondamental initialisé (277Hz / 277 particules).', 'color:#c084fc; font-weight:bold;');
    </script>
</body>
</html>
