<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Galibier • Atome d'Hydrogène Vibecodé</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #000015 0%, #000000 60%, #02030a 100%);
            font-family: system-ui, sans-serif;
            color: #eee;
        }
        #center {
				    position: fixed;
				    top: 0;
				    left: 0;
				    width: 100vw;
				    height: 100vh;
				    display: flex;
				    justify-content: center;
				    align-items: center;
				}
				
				canvas {
				    display: block;
				}
        #ui {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(6px);
        }
        button {
            margin: 4px 0;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #111;
            color: #eee;
            cursor: pointer;
        }
        button:hover {
            background: #222;
        }
    </style>
</head>
<body>
<div id="ui">
    <div><strong>Modes vibecodés</strong></div>
    <button id="btnSpin">Toggle Spin (? / ?)</button><br>
    <button id="btnHelium">Toggle Galibier Helium (1e? / 2e?)</button><br>
    <button id="btnAudio">Activer Audio 532 Hz (micro / son)</button>
</div>

<div id="center">
    <canvas id="scene"></canvas>
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<script>
    // --- Setup de base ---
    const canvas = document.getElementById('scene');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000005, 0.12);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0.8, 6);

    const clock = new THREE.Clock();

    // --- Lumière ---
    const ambient = new THREE.AmbientLight(0x404080, 0.8);
    scene.add(ambient);

    const pointLight = new THREE.PointLight(0xffffff, 1.2, 30);
    pointLight.position.set(0, 0, 0);
    scene.add(pointLight);

    // --- Noyau ---
    const nucleusGeo = new THREE.SphereGeometry(0.5, 32, 32);
    const nucleusMat = new THREE.MeshStandardMaterial({
        color: 0x0000ff,
        emissive: 0x220022,
        emissiveIntensity: 0.6,
        roughness: 0.3,
        metalness: 0.7
    });
    const nucleus = new THREE.Mesh(nucleusGeo, nucleusMat);
    scene.add(nucleus);

    // --- Électron(s) ---
    const electronGeo = new THREE.SphereGeometry(0.06, 16, 16);
    const electronMat = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        emissive: 0x000000,
        emissiveIntensity: 0.0,
        roughness: 0.2,
        metalness: 0.9
    });

    const electron1 = new THREE.Mesh(electronGeo, electronMat.clone());
    scene.add(electron1);

    const electron2 = new THREE.Mesh(electronGeo, electronMat.clone());
    electron2.visible = false; // pour Helium mode
    scene.add(electron2);

    // --- Trainée dorée (simple Line) ---
    const trailPoints = [];
    const maxTrailPoints = 120;
    for (let i = 0; i < maxTrailPoints; i++) {
        trailPoints.push(new THREE.Vector3(0, 0, 0));
    }
    const trailGeo = new THREE.BufferGeometry().setFromPoints(trailPoints);
    const trailMat = new THREE.LineBasicMaterial({
        color: 0xFFD700,
        transparent: true,
        opacity: 0.85
    });
    const trail = new THREE.Line(trailGeo, trailMat);
    scene.add(trail);
		
		// --- TRAÎNÉE DORÉE POUR ELECTRON 2 ---
    const trailPoints2 = [];
    const maxTrailPoints2 = 120;
    for (let i = 0; i < maxTrailPoints; i++) {
        trailPoints.push(new THREE.Vector3(0, 0, 0));
    }
    const trailGeo2 = new THREE.BufferGeometry().setFromPoints(trailPoints2);
    const trailMat2 = new THREE.LineBasicMaterial({
        color: 0xFFD700,
        transparent: true,
        opacity: 0.85
    });
    const trail2 = new THREE.Line(trailGeo, trailMat);
    scene.add(trail2);

    // --- Particules dorées ---
    const goldGeo = new THREE.BufferGeometry();
    const goldCount = 200;
    const goldPositions = new Float32Array(goldCount * 3);
    for (let i = 0; i < goldCount; i++) {
        const r = 2.0 + Math.random() * 1.5;
        const a = Math.random() * Math.PI * 2;
        const y = (Math.random() - 0.5) * 1.5;
        goldPositions[i * 3] = Math.cos(a) * r;
        goldPositions[i * 3 + 1] = y;
        goldPositions[i * 3 + 2] = Math.sin(a) * r;
    }
    goldGeo.setAttribute('position', new THREE.BufferAttribute(goldPositions, 3));
    const goldMat = new THREE.PointsMaterial({
        color: 0xFFD700,
        size: 0.05,
        transparent: true,
        opacity: 0.9
    });
    const goldParticles = new THREE.Points(goldGeo, goldMat);
    scene.add(goldParticles);

    // --- États quantiques / modes ---
    let spinUp = true;          // spin ? / ?
    let heliumMode = false;     // 1 électron / 2 électrons
    let audioEnabled = false;

    // --- Audio / spectre ---
    let audioCtx = null;
    let analyser = null;
    let freqData = null;

    async function initAudio() {
        if (audioEnabled) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;
            source.connect(analyser);
            freqData = new Uint8Array(analyser.frequencyBinCount);
            audioEnabled = true;
            console.log("Audio vibecodé activé.");
        } catch (e) {
            console.warn("Audio non disponible:", e);
        }
    }

    function getAudioEnergyAround(targetFreq = 532) {
        if (!audioEnabled || !analyser || !freqData) return 0.5;
        analyser.getByteFrequencyData(freqData);
        const nyquist = audioCtx.sampleRate / 2;
        const index = Math.round(targetFreq / nyquist * freqData.length);
        const windowSize = 4;
        let sum = 0;
        let count = 0;
        for (let i = index - windowSize; i <= index + windowSize; i++) {
            if (i >= 0 && i < freqData.length) {
                sum += freqData[i];
                count++;
            }
        }
        const avg = count > 0 ? sum / count : 0;
        return avg / 255; // normalisé 0 ? 1
    }

    // --- UI boutons ---
    document.getElementById('btnSpin').onclick = () => {
        spinUp = !spinUp;
    };
    document.getElementById('btnHelium').onclick = () => {
        heliumMode = !heliumMode;
        electron2.visible = heliumMode;
        trail2.visible = heliumMode;
        if (heliumMode) {
				    const positions2 = trail2.geometry.attributes.position.array;
				
				    for (let i = maxTrailPoints - 1; i > 0; i--) {
				        positions2[i * 3]     = positions2[(i - 1) * 3];
				        positions2[i * 3 + 1] = positions2[(i - 1) * 3 + 1];
				        positions2[i * 3 + 2] = positions2[(i - 1) * 3 + 2];
				    }
				
				    positions2[0] = electron2.position.x;
				    positions2[1] = electron2.position.y;
				    positions2[2] = electron2.position.z;
				
				    trail2.geometry.attributes.position.needsUpdate = true;
				
				    // opacité douce (pas de bâtons)
				    trail2.material.opacity = 0.32 + audioAmp * 0.08;
				}
    };
    document.getElementById('btnAudio').onclick = () => {
        initAudio();
    };

    // --- Resize ---
    window.addEventListener('resize', () => {
        const w = window.innerWidth;
        const h = window.innerHeight;
        renderer.setSize(w, h);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
    });

    // --- Animation ---
    function animate() {
        requestAnimationFrame(animate);
        const time = clock.getElapsedTime();

        // Audio ? amplitude
        const audioAmp = getAudioEnergyAround(532); // 0 ? 1
        const baseAmp = 0.4 + Math.sin(time * 0.8) * 0.3;
        const amp = THREE.MathUtils.clamp(baseAmp + audioAmp * 0.6, 0.1, 1.4);

        // Noyau : bleu petit ? rouge grand (via HSL)
        // amp petit ? bleu, amp grand ? rouge
        const nucleusColor = new THREE.Color().setHSL(
            (1 - amp) * 0.6, // 0.6 ˜ bleu, 0 ˜ rouge
            1.0,
            0.5
        );
        nucleus.material.color.copy(nucleusColor);

        // Spin mode : ? / ? change l’émissif et la “vibe”
        if (spinUp) {
            nucleus.material.emissive.set(0x220044);
            nucleus.material.emissiveIntensity = 0.9 + audioAmp * 0.6;
        } else {
            nucleus.material.emissive.set(0x440011);
            nucleus.material.emissiveIntensity = 0.4 + audioAmp * 0.4;
        }

        // Taille du noyau
        nucleus.scale.setScalar(0.3 + amp * 0.9);

        // Orbite plus grande
        const radius = 1.2 + amp * 1.0;

        // Électron multicolore (HSV cycle)
        const hue1 = (time * 0.15 + audioAmp * 0.5) % 1.0;
        electron1.material.color.setHSL(hue1, 1.0, 0.5);
        electron1.material.emissive.setHSL(hue1, 1.0, 0.3);
        electron1.material.emissiveIntensity = 0.8 + audioAmp * 0.8;

        // Position électron 1 (chaotique mais fluide)
        electron1.position.set(
            Math.cos(time * 2.0) * radius,
            Math.sin(time * 3.0) * radius * 0.6,
            Math.sin(time * 1.5) * radius
        );

        // Helium mode : deuxième électron synchronisé mais déphasé
        if (heliumMode) {
            const hue2 = (hue1 + 0.33) % 1.0;
            electron2.material.color.setHSL(hue2, 1.0, 0.5);
            electron2.material.emissive.setHSL(hue2, 1.0, 0.3);
            electron2.material.emissiveIntensity = 0.8 + audioAmp * 0.8;

            electron2.position.set(
                Math.cos(time * 2.0 + Math.PI) * radius,
                Math.sin(time * 3.0 + Math.PI / 2) * radius * 0.6,
                Math.sin(time * 1.5 + Math.PI / 3) * radius
            );
        }

        // Trainée dorée : on pousse les points
        const positions = trail.geometry.attributes.position.array;
        for (let i = maxTrailPoints - 1; i > 0; i--) {
            positions[i * 3]     = positions[(i - 1) * 3];
            positions[i * 3 + 1] = positions[(i - 1) * 3 + 1];
            positions[i * 3 + 2] = positions[(i - 1) * 3 + 2];
        }
        positions[0] = electron1.position.x;
        positions[1] = electron1.position.y;
        positions[2] = electron1.position.z;
        trail.geometry.attributes.position.needsUpdate = true;

        // Glow doré modulé par audio
        trail.material.opacity = 0.6 + audioAmp * 0.4;
        goldParticles.rotation.y = time * 0.1;
        goldParticles.rotation.x = time * 0.03;

        renderer.render(scene, camera);
    }

    animate();
</script>
</body>
</html>
