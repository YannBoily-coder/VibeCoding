<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Galibier • Respiration de l'Atome</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #000015 0%, #000000 60%, #02030a 100%);
            font-family: system-ui, sans-serif;
            color: #eee;
        }

        #center {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
        }

        #ui {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(6px);
        }

        .btn-group {
            display: flex;
            gap: 6px;
            margin: 4px 0;
        }

        button {
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #111;
            color: #eee;
            cursor: pointer;
            transition: background 0.3s, border-color 0.3s;
        }

        button:hover:not(:disabled) {
            background: #333;
        }

        button:disabled {
            background: #000;
            color: #555;
            cursor: not-allowed;
            border-color: #222;
        }

        #btnAudio, #btnSpin {
            width: 100%;
            margin: 4px 0;
        }

        #electron-counter {
            font-size: 0.9em;
            margin-bottom: 6px;
            text-align: center;
            color: #FFD700;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div><strong>Modes vibecodés</strong></div>
        <button id="btnSpin">Toggle Spin (↑ / ↓)</button><br>

        <div style="margin: 8px 0 4px 0; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 6px;">
            <div id="electron-counter">Électrons : 1 / 10</div>
            <div class="btn-group">
                <button id="btnRemoveElectron" style="flex: 1;" disabled>Retirer [-]</button>
                <button id="btnAddElectron" style="flex: 1;">Ajouter [+]</button>
                <input type="checkbox" id="chaosToggle">
            </div>
        </div>

        <button id="btnAudio">Activer Audio 532 Hz</button>
    </div>

    <div id="center">
        <canvas id="scene"></canvas>
    </div>

    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

    <script>
        // --- Setup de base ---
        const canvas = document.getElementById('scene');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000005, 0.12);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0.8, 6);

        const clock = new THREE.Clock();

        // --- Lumière ---
        const ambient = new THREE.AmbientLight(0x404080, 0.8);
        scene.add(ambient);
        const pointLight = new THREE.PointLight(0xffffff, 1.2, 30);
        pointLight.position.set(0, 0, 0);
        scene.add(pointLight);

        // --- Noyau ---
        const nucleusGeo = new THREE.SphereGeometry(0.5, 32, 32);
        const nucleusMat = new THREE.MeshStandardMaterial({
            color: 0x0000ff,
            emissive: 0x220022,
            emissiveIntensity: 0.6,
            roughness: 0.3,
            metalness: 0.7
        });
        const nucleus = new THREE.Mesh(nucleusGeo, nucleusMat);
        scene.add(nucleus);

        // --- Gestion Dynamique des Électrons ---
        const electrons = [];
        const trails = [];
        const maxElectrons = 10;
        const maxTrailPoints = 120;
        const electronGeo = new THREE.SphereGeometry(0.06, 16, 16);

        function addElectron() {
            if (electrons.length >= maxElectrons) return;

            const eMat = new THREE.MeshStandardMaterial({
                color: 0xffffff,
                emissive: 0x000000,
                emissiveIntensity: 0.0,
                roughness: 0.2,
                metalness: 0.9
            });
            const mesh = new THREE.Mesh(electronGeo, eMat);
            scene.add(mesh);
            electrons.push(mesh);

            const trailPoints = [];
            for (let i = 0; i < maxTrailPoints; i++) {
                trailPoints.push(new THREE.Vector3(0, 0, 0));
            }
            const tGeo = new THREE.BufferGeometry().setFromPoints(trailPoints);
            const tMat = new THREE.LineBasicMaterial({
                color: 0xFFD700,
                transparent: true,
                opacity: 0.85
            });
            const line = new THREE.Line(tGeo, tMat);
            scene.add(line);
            trails.push(line);

            updateUI();
        }

        function removeElectron() {
            if (electrons.length <= 1) return;

            const lastElectron = electrons.pop();
            scene.remove(lastElectron);
            lastElectron.geometry.dispose();
            lastElectron.material.dispose();

            const lastTrail = trails.pop();
            scene.remove(lastTrail);
            lastTrail.geometry.dispose();
            lastTrail.material.dispose();

            updateUI();
        }

        function updateUI() {
            const count = electrons.length;
            document.getElementById('electron-counter').innerText = `Électrons : ${count} / ${maxElectrons}`;

            const btnAdd = document.getElementById('btnAddElectron');
            if (count >= maxElectrons) {
                btnAdd.disabled = true;
                btnAdd.innerText = "Max";
            } else {
                btnAdd.disabled = false;
                btnAdd.innerText = "Ajouter [+]";
            }

            const btnRemove = document.getElementById('btnRemoveElectron');
            if (count <= 1) {
                btnRemove.disabled = true;
            } else {
                btnRemove.disabled = false;
            }
        }

        // Initialisation du premier électron (Hydrogène)
        addElectron();

        // --- Particules dorées de fond ---
        const goldGeo = new THREE.BufferGeometry();
        const goldCount = 200;
        const goldPositions = new Float32Array(goldCount * 3);
        for (let i = 0; i < goldCount; i++) {
            const r = 2.0 + Math.random() * 1.5;
            const a = Math.random() * Math.PI * 2;
            const y = (Math.random() - 0.5) * 1.5;
            goldPositions[i * 3] = Math.cos(a) * r;
            goldPositions[i * 3 + 1] = y;
            goldPositions[i * 3 + 2] = Math.sin(a) * r;
        }
        goldGeo.setAttribute('position', new THREE.BufferAttribute(goldPositions, 3));
        const goldMat = new THREE.PointsMaterial({
            color: 0xFFD700,
            size: 0.05,
            transparent: true,
            opacity: 0.9
        });
        const goldParticles = new THREE.Points(goldGeo, goldMat);
        scene.add(goldParticles);

        // --- États quantiques / modes ---
        let spinUp = true;
        let audioEnabled = false;
        let x = 0, y = 0; // Déclaration des variables pour le mode chaos

        // --- Audio / spectre ---
        let audioCtx = null;
        let analyser = null;
        let freqData = null;

        async function initAudio() {
            if (audioEnabled) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
                source.connect(analyser);
                freqData = new Uint8Array(analyser.frequencyBinCount);
                audioEnabled = true;
                console.log("Audio vibecodé activé.");
            } catch (e) {
                console.warn("Audio non disponible:", e);
            }
        }

        function getAudioEnergyAround(targetFreq = 532) {
            if (!audioEnabled || !analyser || !freqData) return 0.5;
            analyser.getByteFrequencyData(freqData);
            const nyquist = audioCtx.sampleRate / 2;
            const index = Math.round(targetFreq / nyquist * freqData.length);
            const windowSize = 4;
            let sum = 0;
            let count = 0;
            for (let i = index - windowSize; i <= index + windowSize; i++) {
                if (i >= 0 && i < freqData.length) {
                    sum += freqData[i];
                    count++;
                }
            }
            return (count > 0 ? sum / count : 0) / 255;
        }

        // --- UI boutons ---
        document.getElementById('btnSpin').onclick = () => { spinUp = !spinUp; };
        document.getElementById('btnAddElectron').onclick = () => { addElectron(); };
        document.getElementById('btnRemoveElectron').onclick = () => { removeElectron(); };
        document.getElementById('btnAudio').onclick = () => { initAudio(); };

        // --- Resize ---
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });

        // --- Animation ---
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            const audioAmp = getAudioEnergyAround(532);
            const baseAmp = 0.4 + Math.sin(time * 0.8) * 0.3;
            const amp = THREE.MathUtils.clamp(baseAmp + audioAmp * 0.6, 0.1, 1.4);

            // Noyau : couleur, spin et taille
            const nucleusColor = new THREE.Color().setHSL((1 - amp) * 0.6, 1.0, 0.5);
            nucleus.material.color.copy(nucleusColor);

            if (spinUp) {
                nucleus.material.emissive.set(0x220044);
                nucleus.material.emissiveIntensity = 0.9 + audioAmp * 0.6;
            } else {
                nucleus.material.emissive.set(0x440011);
                nucleus.material.emissiveIntensity = 0.4 + audioAmp * 0.4;
            }
            nucleus.scale.setScalar(0.3 + amp * 0.9);

            // Rayon de l'orbite globale
            const radius = 1.2 + amp * 1.0;

            // Angle d'or (Golden Angle) pour répartir naturellement la matière
            const goldenAngle = 2.39996;

            // Animation de chaque électron actif
            for (let i = 0; i < electrons.length; i++) {
                const electron = electrons[i];
                const trail = trails[i];

                // Chaque électron a un déphasage unique basé sur le Nombre d'Or
                const phaseX = i * goldenAngle;
                const phaseY = i * goldenAngle * 1.5;
                const phaseZ = i * goldenAngle * 0.5;

                // Dégradé de couleur harmonieux entre tous les électrons
                const hue = (time * 0.15 + audioAmp * 0.5 + (i / maxElectrons)) % 1.0;
                electron.material.color.setHSL(hue, 1.0, 0.5);
                electron.material.emissive.setHSL(hue, 1.0, 0.3);
                electron.material.emissiveIntensity = 0.8 + audioAmp * 0.8;

                // Position calculée avec le déphasage
                electron.position.set(
                    Math.cos(time * 2.0 + phaseX) * radius,
                    Math.sin(time * 3.0 + phaseY) * radius * 0.6,
                    Math.sin(time * 1.5 + phaseZ) * radius
                );

                // Mise à jour de la traînée de cet électron
                const positions = trail.geometry.attributes.position.array;
                for (let j = maxTrailPoints - 1; j > 0; j--) {
                    positions[j * 3]     = positions[(j - 1) * 3];
                    positions[j * 3 + 1] = positions[(j - 1) * 3 + 1];
                    positions[j * 3 + 2] = positions[(j - 1) * 3 + 2];
                }
                positions[0] = electron.position.x;
                positions[1] = electron.position.y;
                positions[2] = electron.position.z;
                trail.geometry.attributes.position.needsUpdate = true;

                // Ajustement de l'opacité selon le nombre d'électrons
                trail.material.opacity = (0.6 - (electrons.length * 0.03)) + audioAmp * 0.4;
            }

            // Particules de fond
            goldParticles.rotation.y = time * 0.1;
            goldParticles.rotation.x = time * 0.03;

            // Mode Chaos
            const chaosLevel = document.getElementById('chaosToggle').checked ? 0.1 : 0;
            if (chaosLevel) {
                x += (Math.random() - 0.5) * chaosLevel * 3;
                y += (Math.random() - 0.5) * chaosLevel * 3;
                nucleus.position.set(x, y, 0);
            } else {
                nucleus.position.set(0, 0, 0);
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
