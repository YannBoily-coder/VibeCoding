<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Promontoire de Résonance • Galaxie Corrective</title>
    <style>
        body { margin: 0; background: #050a14; overflow: hidden; color: #e0e7ff; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; width: 320px; background: rgba(10, 15, 30, 0.8); padding: 15px; border-radius: 12px; border: 1px solid #1e293b; pointer-events: auto; }
        h1 { margin: 0; font-weight: 200; letter-spacing: 4px; text-transform: uppercase; color: #60a5fa; font-size: 1.1rem; }
        .data { font-size: 0.8rem; opacity: 0.7; margin-bottom: 15px; }
        .gemini-controls { display: flex; flex-direction: column; gap: 8px; }
        button { background: #1e293b; border: 1px solid #60a5fa; color: #e0e7ff; padding: 10px; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 0.8rem; text-align: left;}
        button:hover { background: #60a5fa; color: #050a14; }
        #output { margin-top: 15px; font-size: 0.85rem; color: #fbbf24; font-style: italic; min-height: 40px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<div id="ui">
    <h1>Galibier • Promontoire</h1>
    <div class="data">Fréquence : 532Hz • État : Structure Activée</div>
    <div class="gemini-controls">
        <button onclick="askGemini('interprète la fréquence 532Hz pour un réserviste')">✨ Interpréter la Fréquence (IA)</button>
        <button onclick="askGemini('maxime sur l\'engagement de service alpin')">✨ Maxime d\'Engagement (IA)</button>
    </div>
    <div id="output">Galaxie stable. En attente de connexion IA (Clé API nécessaire).</div>
</div>

<script>
    // --- 1. CONFIGURATION THREE.JS (La Galaxie) ---
    // Cette partie fonctionne de manière autonome.
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Création de la Galaxie (plus de points, plus de dispersion)
    const geometry = new THREE.BufferGeometry();
    const count = 15000; // 15 000 points pour une vraie galaxie
    const positions = new Float32Array(count * 3);
    const colors = new Float32Array(count * 3);

    for (let i = 0; i < count * 3; i += 3) {
        // Position en spirale
        const angle = Math.random() * Math.PI * 2;
        const radius = Math.random() * 25;
        const spin = radius * 0.1;
        positions[i] = Math.cos(angle + spin) * radius;
        positions[i + 1] = Math.sin(angle + spin) * radius * (Math.random() * 0.5 + 0.5); // Aplatissement
        positions[i + 2] = (Math.random() - 0.5) * 2; // Épaisseur

        // Couleur (dégradé bleu vers blanc au centre)
        const intensity = 1 - (radius / 25);
        colors[i] = 0.37 + intensity * 0.6; // R
        colors[i + 1] = 0.65 + intensity * 0.3; // G
        colors[i + 2] = 0.98; // B
    }
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({ 
        size: 0.08, 
        vertexColors: true, // Utilise les couleurs définies par point
        transparent: true, 
        opacity: 0.8,
        blending: THREE.AddBlending // Effet de luminescence
    });
    const points = new THREE.Points(geometry, material);
    scene.add(points);
    camera.position.z = 20;

    let turbulence = 1.0;

    // Boucle d'animation autonome
    function animate() {
        requestAnimationFrame(animate);
        const time = Date.now() * 0.0001;
        
        // Rotation lente et constante de la galaxie
        points.rotation.y = time * 0.5 * turbulence;
        points.rotation.z = time * 0.1;
        
        // Oscillation légère
        points.position.y = Math.sin(time * 2) * 0.5;

        renderer.render(scene, camera);
    }
    animate();

    // Redimensionnement
    window.addEventListener('resize', onWindowResize, false);
    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // --- 2. CONFIGURATION GEMINI API (L'IA) ---
    // Nécessite une clé d'API valide pour fonctionner.
    const apiKey = ""; // <--- INSÉREZ VOTRE CLÉ API ICI

    async function askGemini(prompt) {
        const output = document.getElementById('output');
        
        if (!apiKey) {
            output.innerText = "Erreur : Clé API Gemini manquante dans le code.";
            return;
        }

        output.innerText = "Connexion au fluide IA...";
        turbulence = 4.0; // Effet visuel lors de l'appel
        
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await response.json();
            output.innerText = data.candidates[0].content.parts[0].text;
            setTimeout(() => { turbulence = 1.0; }, 3000); // Retour au calme
        } catch (error) {
            output.innerText = "La fréquence IA est instable. Vérifiez la clé ou réessayez.";
            turbulence = 1.0;
        }
    }
</script>
</body>
</html>
