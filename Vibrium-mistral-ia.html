<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibrium (Vb⁹) • Grok Edition corriger par le chat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

        body {
            margin: 0;
            background: #0a001f;
            color: #fff;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 2.8rem;
            text-shadow: 0 0 30px #a020f0;
            margin: 0 0 8px 0;
            letter-spacing: 3px;
        }

        .subtitle {
            color: #a78bfa;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        canvas {
            border: 3px solid #4b0082;
            border-radius: 16px;
            box-shadow: 0 0 60px rgba(160, 32, 240, 0.6),
                        0 0 120px rgba(160, 32, 240, 0.3);
            background: #0a001f;
        }

        .controls {
            margin-top: 25px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        button {
            padding: 12px 28px;
            background: linear-gradient(145deg, #4b0082, #6a0dad);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(160, 32, 240, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(160, 32, 240, 0.6);
        }

        .info {
            margin-top: 15px;
            color: #a78bfa;
            font-size: 0.95rem;
            text-align: center;
            max-width: 520px;
        }
    </style>
</head>
<body>
    <h1>⚛️ VIBRIUM</h1>
    <div class="subtitle">Vibrium (Vb⁹) • Grok Edition corriger par le chat</div>

    <canvas id="canvas" width="720" height="720"></canvas>

    <div class="controls">
        <button onclick="boostVibration()">🚀 BOOSTER LA VIBE</button>
        <button onclick="resetBoost()" style="background: #2a004d;">Reset</button>
    </div>

    <div class="info">
        Clique sur le canvas ou appuie sur <strong>ESPACE</strong> pour booster la vibration.<br>
        Les particules absorbent et réémettent l’énergie comme du vrai Vibrium.
    </div>

    <script>
        // --- Setup du canvas ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // --- Variables globales ---
        let particles = [];
        let boostLevel = 1;

        // --- Classe Particle ---
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.angle = Math.random() * Math.PI * 2;
                this.baseRadius = 90 + Math.random() * 200;
                this.radius = this.baseRadius;
                this.speed = 0.004 + Math.random() * 0.018;
                this.size = 2.5 + Math.random() * 5.5;
                this.hue = 255 + Math.random() * 70;
                this.vibPhase = Math.random() * Math.PI * 2;
                this.direction = Math.random() > 0.5 ? 1 : -1;
            }

            update() {
                this.angle += this.speed * this.direction * boostLevel;

                // Vibration réaliste du Vibrium
                const vib = Math.sin(Date.now() / 110 + this.vibPhase) * (9 * (boostLevel * 0.6 + 0.4));
                this.radius = this.baseRadius + vib;

                // Micro-wobble supplémentaire
                this.angle += Math.sin(Date.now() / 280 + this.vibPhase) * 0.0015 * boostLevel;
            }

            draw() {
                const x = canvas.width / 2 + Math.cos(this.angle) * this.radius;
                const y = canvas.height / 2 + Math.sin(this.angle) * this.radius;

                // Glow principal
                ctx.shadowBlur = 22 * boostLevel;
                ctx.shadowColor = `hsl(${this.hue}, 100%, 70%)`;

                ctx.beginPath();
                ctx.arc(x, y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${this.hue}, 100%, ${55 + Math.random() * 25}%)`;
                ctx.fill();

                // Cœur blanc brillant
                ctx.shadowBlur = 6;
                ctx.beginPath();
                ctx.arc(x, y, this.size * 0.35, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();

                ctx.shadowBlur = 0;
            }
        }

        // --- Fonction pour créer les particules ---
        function createParticles(count = 110) {
            particles = [];
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        // --- Fonction pour dessiner le noyau ---
        function drawCore() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const t = Date.now();

            const pulse = 1 + Math.sin(t / 260) * 0.13 * boostLevel;
            const pulse2 = 1 + Math.sin(t / 190) * 0.09 * boostLevel;

            // Aura externe violette (champ d'énergie)
            ctx.shadowBlur = 70 * boostLevel;
            ctx.shadowColor = '#c084fc';
            ctx.beginPath();
            ctx.arc(cx, cy, 95 * pulse2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(167, 139, 250, 0.12)';
            ctx.fill();
            ctx.shadowBlur = 0;

            // Couches du noyau
            ctx.shadowBlur = 45 * boostLevel;
            ctx.shadowColor = '#a020f0';
            ctx.beginPath();
            ctx.arc(cx, cy, 52 * pulse, 0, Math.PI * 2);
            ctx.fillStyle = '#4c1d95';
            ctx.fill();
            ctx.shadowBlur = 0;

            // Noyau métallique avec dégradé
            const grad = ctx.createRadialGradient(cx - 12, cy - 12, 8, cx, cy, 55);
            grad.addColorStop(0, '#e0b0ff');
            grad.addColorStop(0.4, '#7c3aed');
            grad.addColorStop(1, '#1e1135');

            ctx.beginPath();
            ctx.arc(cx, cy, 38 * pulse, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();

            // Centre ultra-bright
            ctx.beginPath();
            ctx.arc(cx, cy, 16 * pulse, 0, Math.PI * 2);
            ctx.fillStyle = '#f0abfc';
            ctx.fill();

            // Anneaux d'énergie
            ctx.strokeStyle = 'rgba(224, 176, 255, 0.55)';
            ctx.lineWidth = 2.5;
            for (let r = 62; r < 88; r += 13) {
                ctx.beginPath();
                ctx.arc(cx, cy, r * pulse2, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        // --- Boucle d'animation ---
        function animate() {
            // Effet de traînée (vibration + mouvement)
            ctx.fillStyle = 'rgba(10, 0, 31, 0.28)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawCore();

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            ctx.shadowBlur = 0;

            // Décroissance douce du boost
            if (boostLevel > 1) {
                boostLevel *= 0.993;
                if (boostLevel < 1.02) boostLevel = 1;
            }

            requestAnimationFrame(animate);
        }

        // --- Fonction pour booster la vibration ---
        function boostVibration() {
            boostLevel = Math.min(boostLevel * 2.3, 9);

            // Petite explosion de particules en plus (burst)
            for (let i = 0; i < 25; i++) {
                const p = new Particle();
                p.baseRadius = 35 + Math.random() * 55;
                p.radius = p.baseRadius;
                p.speed *= 2.8;
                particles.push(p);
            }

            // Nettoyage léger si trop de particules
            if (particles.length > 200) {
                particles.splice(0, particles.length - 160);
            }
        }

        // --- Fonction pour réinitialiser le boost ---
        function resetBoost() {
            boostLevel = 1;
        }

        // --- Contrôles ---
        canvas.addEventListener('click', boostVibration);

        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                boostVibration();
            }
            if (e.key.toLowerCase() === 'r') {
                resetBoost();
            }
        });

        // --- Lancement ---
        createParticles();
        animate();

        // Message console
        console.log('%c[Vibrium] Simulation chargée. Clique ou ESPACE pour booster la vibration quantique !', 'color:#c084fc');
    </script>
</body>
</html>
